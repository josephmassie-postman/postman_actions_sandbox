$kind: http-request
url: "{{baseUrl}}/api/weather"
method: GET
headers:
  Accept: application/json
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("Weather is an object", function () {
          var json = pm.response.json();
          pm.expect(json).to.be.an("object");
      });

      pm.test("Weather contains a temperature field", function () {
          var json = pm.response.json();
          pm.expect(json).to.have.property("temperatureF");
      });
    language: text/javascript
examples: ./.resources/Get random weather data.resources/examples
order: 1000
