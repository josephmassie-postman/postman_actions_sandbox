$kind: http-request
url: "{{baseUrl}}/api/metrics"
method: GET
headers:
  Accept: application/json
body:
  type: text
  content: ""
scripts:
  - type: afterResponse
    code: |-
      pm.test("Metrics is an object", function () {
          var json = pm.response.json();
          pm.expect(json).to.be.an("object");
      });

      pm.test("Metrics body is not empty", function () {
          var json = pm.response.json();
          pm.expect(Object.keys(json).length).to.be.above(0);
      });
    language: text/javascript
examples: ./.resources/Get random system metrics.resources/examples
order: 1000
